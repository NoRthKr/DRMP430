    function findGlobalNation(query) {
        const resArea = document.getElementById('searchResponse');
        if (!query.trim()) {
            resArea.innerHTML = `<div style="padding:8px; color:var(--text-muted); font-size:11px; text-align:center;">พิมพ์ชื่อสัญชาติเพื่อค้นหา</div>`;
            return;
        }
        const token = query.toLowerCase();
        const matches = masterNationData.filter(i => i.th.toLowerCase().includes(token) || i.en.toLowerCase().includes(token));
        if (matches.length === 0) {
            resArea.innerHTML = `<div style="padding:8px; color:#f43f5e; font-size:11px; text-align:center;">❌ ไม่พบรหัสในฐานข้อมูลหลัก</div>`;
            return;
        }
        resArea.innerHTML = "";
        matches.forEach(m => {
            const row = document.createElement('div');
            row.className = "search-item";
            row.innerHTML = `<span>🇹🇭 ${m.th} (${m.en})</span> <span>รร.4: <b>${m.rr4 || '97'}</b> | ตม.30: <b>${m.tm30}</b></span>`;
            resArea.appendChild(row);
        });
    }

    function renderHeaderOnly() {
        const thead = document.getElementById('tableHeader');
        thead.innerHTML = "<tr>" + headersConfig[currentMode].map(h => `<th>${h.replace(/\n/g, '<br>')}</th>`).join('') + "</tr>";
    }

    function loadCsvFile(input) {
        if (!input.files.length) return;
        document.getElementById('statusLabel').innerText = "เลือกไฟล์แล้ว: " + input.files[0].name;
        Papa.parse(input.files[0], {
            header: true, skipEmptyLines: true,
            complete: function(res) {
                rawCsvData = res.data;
                processAndTransform();
                document.getElementById('downloadBtn').disabled = false;
            }
        });
    }

    function cleanDateFormat(str) {
        if (!str || str === "-") return "";
        const mList = { jan:"01", feb:"02", mar:"03", apr:"04", may:"05", jun:"06", jul:"07", aug:"08", sep:"09", oct:"10", nov:"11", dec:"12" };
        const items = str.trim().split(" ");
        if (items.length >= 3) {
            return `${items[0].padStart(2, '0')}/${mList[items[1].toLowerCase().substring(0,3)] || '01'}/${items[2]}`;
        }
        return str;
    }

    function processAndTransform() {
        renderHeaderOnly();
        tableWorkingRows = [];
        rawCsvData.forEach((row, i) => {
            const fName = (row["First Name"] || "").trim();
            const lName = (row["Last Name"] || "").trim();
            const sex = (row["Sex"] || "").trim().toLowerCase();
            const rawNation = (row["Nationality"] || "").trim();
            const mappingMatch = masterNationData.find(n => n.th.toLowerCase() === rawNation.toLowerCase() || n.en.toLowerCase() === rawNation.toLowerCase());
            
            if (currentMode === 'rr4') {
                const isThai = /[ก-๙]/.test(fName);
                const codeRr4 = mappingMatch ? mappingMatch.rr4 : "97";
                let tTh = "", nTh = "", sTh = "", tEn = "", nEn = "", sEn = "";
                if (isThai) {
                    tTh = (sex === 'male' || sex === 'm') ? 'นาย' : 'นางสาว'; nTh = fName; sTh = lName;
                } else {
                    tEn = (sex === 'male' || sex === 'm') ? 'Mr.' : 'Ms.'; nEn = fName; sEn = lName;
                }
                tableWorkingRows.push([
                    i + 1, cleanDateFormat(row["Check In"]), "14.00", row["Room"] || "",
                    tTh, nTh, "", sTh, tEn, nEn, "", sEn, codeRr4, 
                    (row["Citizen Id"] === "-" ? "" : row["Citizen Id"]) || "",
                    (row["Passport No."] === "-" ? "" : row["Passport No."]) || "", "",
                    "ประเทศไทย", "99", "146", "ประเทศไทย", "99", "ประเทศไทย", "99",
                    cleanDateFormat(row["Check Out"]), "12.00", "", ""
                ]);
            } else {
                if (mappingMatch && mappingMatch.tm30 === "THA") return; 
                const codeTm30 = mappingMatch ? mappingMatch.tm30 : rawNation.toUpperCase();
                const genLabel = (sex === 'male' || sex === 'm') ? 'M' : (sex === 'female' || sex === 'f') ? 'F' : '';
                tableWorkingRows.push([
                    fName, "", lName, genLabel,
                    (row["Passport No."] === "-" ? "" : row["Passport No."]) || "",
                    codeTm30, cleanDateFormat(row["Date of Birth"]),
                    cleanDateFormat(row["Check Out"]), ""
                ]);
            }
        });
        renderOutputTable();
    }

    function renderOutputTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        if (tableWorkingRows.length === 0) {
            tbody.innerHTML = `<tr><td colspan="${headersConfig[currentMode].length}" style="text-align: center; color: var(--text-muted); padding: 50px;">ไม่มีข้อมูลแสดงผลในหมวดนี้</td></tr>`;
            return;
        }
        tableWorkingRows.forEach((row, rIdx) => {
            const tr = document.createElement('tr');
            row.forEach((cell, cIdx) => {
                const td = document.createElement('td');
                if (currentMode === 'rr4' && cIdx === 0) {
                    td.innerHTML = `<strong>${cell}</strong>`;
                } else {
                    td.innerHTML = `<input type="text" value="${cell}" onchange="editCellData(${rIdx}, ${cIdx}, this.value)">`;
                }
                tr.appendChild(td);
            });
            tbody.appendChild(tr);
        });
    }

    function editCellData(r, c, val) {
        if (tableWorkingRows[r]) tableWorkingRows[r][c] = val;
    }

    function triggerDownload() {
        if (tableWorkingRows.length === 0) return;
        
        if (currentMode === 'rr4') {
            const checkInDate = tableWorkingRows[0][1] || "export";
            const excelRows = [
                ["", "", "", "", "", "", "", "", "", "", "", "ทะเบียนผู้เข้าพักในโรงแรม", "", "", "", "", "", "", "", "", "", "", "", "", "", "ร.ร.๔"],
                ["", "", "", "", "", "", "", "", "", "", "", "ประจำวันที่", "", checkInDate, "", "", "", "", "", "", "", "", "", "", "", ""],
                headersConfig.rr4,
                ["rowNo", "dateCheckIn", "timeCheckIn", "roomNo", "titleNameTh", "nameTh", "middleNameTh", "surnameTh", "titleNameEn", "nameEn", "middleNameEn", "surnameEn", "nationality", "pid", "passport", "issuedBy", "address", "addressCountry", "occupation", "comeFrom", "comeFromCountry", "willGo", "willGoCountry", "dateCheckOut", "timeCheckOut", "dataStatus", "remarks"]
            ];
            tableWorkingRows.forEach(r => excelRows.push(r));
            const ws = XLSX.utils.aoa_to_sheet(excelRows);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "รร.4");
            XLSX.writeFile(wb, `ทะเบียนผู้เข้าพัก_รร4_${checkInDate.replace(/\//g, "-")}.xlsx`);
        } else {
            const tm30Rows = [ headersConfig.tm30 ];
            tableWorkingRows.forEach(r => tm30Rows.push(r));
            
            const ws = XLSX.utils.aoa_to_sheet(tm30Rows);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
            
            XLSX.writeFile(wb, "Immigration_Form_A.xls", { bookType: 'biff8', type: 'binary' });
        }
    }

    updateGuideAndLabels();
    renderHeaderOnly();
</script>

</body>
</html>
